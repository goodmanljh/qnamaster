    const callGeminiAPI = async (promptConfig) => {
      const workerUrl = "https://low-pheasant-40.goodmanljh.deno.net"; 
      
      const delays = [1000, 2000, 4000, 8000, 16000];
      let lastError = null;

      for (let attempt = 0; attempt <= delays.length; attempt++) {
        try {
          const response = await fetch(workerUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(promptConfig)
          });
          
          if (response.ok) {
            const data = await response.json();
            return JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text);
          }
          
          const errData = await response.json().catch(() => ({}));
          const errorMessage = errData.error?.message || "API 요청 실패";
          lastError = new Error(`[${response.status}] ${errorMessage}`);
          
          if ([400, 403, 404].includes(response.status)) {
            throw lastError;
          }
        } catch (err) {
          lastError = err;
          if (err.message.includes('[400]') || err.message.includes('[403]') || err.message.includes('[404]')) {
            throw err;
          }
        }
        if (attempt < delays.length) await new Promise(res => setTimeout(res, delays[attempt]));
      }
      
      throw lastError;
    };

    const getContextDef = (scenario) => {
      const contextMap = {
        '사적 스몰토크': '대상: 지인/친구. 특징: 완전한 비격식, 사적 관심사 및 취미 공유. 방향성: 비즈니스 어휘가 철저히 배제된 캐주얼한 관용어 및 슬랭 위주.',
        '비즈니스 스몰토크': '대상: 타 부서 동료/업계 관계자. 특징: 격식 유지, 중립적 주제. 방향성: 구체적 업무 지시가 아닌 라포(Rapport) 형성 목적의 대화.',
        '팀 미팅': '대상: 내부 팀원. 특징: 실무 진행 상황 보고, TO-BE 프로세스 확정, 피드백 교환. 방향성: 전문 용어/축약어 사용, 직설적이고 효율적인 의사소통.',
        '클라이언트 대화': '대상: 외부 고객/파트너. 특징: 고도의 격식, 제안, 조건 협상, 정중한 거절. 방향성: 회사를 대표하여 가장 정제되고 완곡한 형태의 비즈니스 영어 사용.',
        '해외 출장': '대상: 공항/호텔 직원, 현지 법인 담당자. 특징: 수속, 일정 변경, 돌발 상황 대처. 방향성: 생존형 및 문제 해결형 실무 영어 중심.',
        'IT 트러블슈팅': '대상: IT 지원팀/개발자. 특징: 시스템 오류 보고, 앱 버그 설명, 데이터 수정 요청. 방향성: 문제 현상과 원인을 정확하고 논리적으로 묘사.',
        '교육/가족': '대상: 교사, 다른 학부모 등. 특징: 자녀 교육 관련 논의, 학부모 모임. 방향성: 사적 영역이지만 정중한 격식과 예의가 필요한 영어 사용.'

      return contextMap[scenario] || scenario;

    // 1단계: 질문과 힌트만 생성
    const generateQuestionData = async (scenario, topicInput, previousHints = []) => {
      let excludeInstruction = previousHints?.length > 0 ? `\n★주의: 다음 표현은 이전 대화에서 사용되었으므로 이번에는 반드시 제외하고 다른 표현을 제시할 것: [${previousHints.join(', ')}]` : "";
      const contextDef = getContextDef(scenario);
      
      const basePrompt = `당신은 주어진 상황의 대화 상대방입니다. 자연스러운 영어 질문(혹은 추가/후속 질문) 1개를 작성하고, 핵심 영어 단어/숙어(힌트) 3개를 제공해주세요.${excludeInstruction}\n각 힌트에 예문(example_en, example_ko) 포함.\n(주의: 모범 답안은 아직 작성하지 마세요. 질문과 힌트만 제공하세요.)`;
      
      let prompt = topicInput ? 
        `상황: ${scenario}\n상황의 성격 및 방향성: ${contextDef}\n대화/발표 주제: "${topicInput}".\n${basePrompt}` : 
        `상황: ${scenario}\n상황의 성격 및 방향성: ${contextDef}\n\n이 상황의 목적과 관계의 성격에 정확히 부합하는 구체적이고 현실적인 대화 주제를 무작위로 1개 선정하세요.\n${basePrompt}`;

      return await callGeminiAPI({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              topic: { type: "STRING" },
              question_en: { type: "STRING" },
              question_ko: { type: "STRING" },
              hints: { 
                type: "ARRAY", 
                items: { 
                  type: "OBJECT",
                  properties: { en: { type: "STRING" }, ko: { type: "STRING" }, example_en: { type: "STRING" }, example_ko: { type: "STRING" } }
                } 
              }
            },
            required: ["topic", "question_en", "question_ko", "hints"]
          }
        }
      });
    };

    // 2단계: 백그라운드에서 답변 생성
    const generateAnswerData = async (scenario, topic, question_en, hints) => {
      const hintWords = hints.map(h => h.en).join(', ');
      const prompt = `상황: ${scenario}\n주제: ${topic}\n상대방의 질문: "${question_en}"\n제공된 힌트 어휘: [${hintWords}]\n\n위 질문에 대한 모범 답변을 [초중급, 중고급, 고급] 3가지 난이도로 작성해주세요.\n★매우 중요: 모범 답변 영문장 작성 시, 제공된 힌트가 쓰인 부분은 대괄호 두 개로 감싸주세요. (예: I [[kept in mind]] that...)`;

      return await callGeminiAPI({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              answers: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: { level: { type: "STRING" }, en: { type: "STRING" }, ko: { type: "STRING" } }
                }
              }
            },
            required: ["answers"]
          }
        }
      });
    };

    const fetchExtraExamples = async (phrase) => {
      const data = await callGeminiAPI({
        contents: [{ parts: [{ text: `영어 표현 "${phrase}"를 사용한 자연스럽고 실용적인 예문 2개를 작성해주세요.` }] }],
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              examples: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: { en: { type: "STRING" }, ko: { type: "STRING" } }
                }
              }
            }
          }
        }
      });
      return data.examples;
    };

    const playTTSBrowser = (text) => {
      return new Promise((resolve) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel(); 
          setTimeout(() => {
            const cleanText = text.replace(/\[\[/g, '').replace(/\]\]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.onend = resolve;
            utterance.onerror = resolve;
            window.speechSynthesis.speak(utterance);
          }, 50); 
        } else resolve();
      });
    };

    const renderHighlightedText = (text, level) => {
      if (!text) return null;
      const parts = text.split(/\[\[(.*?)\]\]/g);
      const style = LEVEL_STYLES[level] || LEVEL_STYLES['기본'];
      return parts.map((part, i) => (i % 2 === 1) 
        ? <mark key={i} className={`font-semibold px-[7px] py-[3px] rounded-[8px] ${style.highlightBg} ${style.highlightText} bg-opacity-100 mx-[1px]`}>{part}</mark>
        : <span key={i}>{part}</span>
      );
    };

    const BookmarkIcon = ({ filled }) => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill={filled ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
    const BackIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const LightbulbIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;
    const RefreshIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const LoaderIcon = ({ className="animate-spin h-6 w-6" }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>;
    const SmileIcon = ({ className="w-5 h-5" }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>;
    const LevelIcon = ({ level, className="w-3.5 h-3.5" }) => {
      if (level === '초중급') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 22l10-10"/></svg>;
      if (level === '중고급') return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
      return <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    };
    const CheckCircleIcon = ({ selected }) => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill={selected ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={selected ? "text-[#4F46E5]" : "text-slate-300 dark:text-slate-600"}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const CheckmarkFilled = ({ className="w-5 h-5 text-[#4F46E5]" }) => <svg viewBox="0 0 24 24" fill="currentColor" className={className}><path fillRule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clipRule="evenodd" /></svg>;
    const MoonIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
    const SunIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;

    const scenarioOptions = [
      { name: '사적 스몰토크', desc: '완전 비격식, 사적 관심사', iconBg: 'bg-[#EA580C]/10', iconColor: 'text-[#EA580C]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM2 21h18v-2H2v2z"/></svg> },
      { name: '비즈니스 스몰토크', desc: '중립적 격식, 네트워킹', iconBg: 'bg-[#4F46E5]/10', iconColor: 'text-[#4F46E5]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg> },
      { name: '팀 미팅', desc: '실무 보고, 직설적 논의', iconBg: 'bg-[#16A34A]/10', iconColor: 'text-[#16A34A]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg> },
      { name: '클라이언트 대화', desc: '고도의 격식, 제안 협상', iconBg: 'bg-[#7C3AED]/10', iconColor: 'text-[#7C3AED]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/></svg> },
      { name: '해외 출장', desc: '생존형/문제 해결형 실무', iconBg: 'bg-[#0284C7]/10', iconColor: 'text-[#0284C7]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg> },
      { name: 'IT 트러블슈팅', desc: '오류 보고 및 수정 요청', iconBg: 'bg-[#DC2626]/10', iconColor: 'text-[#DC2626]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M20 8h-2.81c-.45-.78-1.07-1.45-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5c-.49 0-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8zm-6 8h-4v-2h4v2zm0-4h-4v-2h4v2z"/></svg> },
      { name: '교육/가족', desc: '학부모 행사 및 예의 대화', iconBg: 'bg-[#D97706]/10', iconColor: 'text-[#D97706]', icon: <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6"><path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/></svg> }
    ];

    function App() {
      const [view, setView] = useState('setup');
      const [scenario, setScenario] = useState('사적 스몰토크');
      const [inputTopic, setInputTopic] = useState('');
      const [isDarkMode, setIsDarkMode] = useState(false);
      
      const [currentRecommendations, setCurrentRecommendations] = useState([]);
      const [qData, setQData] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);
      const [loadingText, setLoadingText] = useState('');
      const [isGeneratingNext, setIsGeneratingNext] = useState(false); 
      const [isGeneratingAnswers, setIsGeneratingAnswers] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      
      const [savedItems, setSavedItems] = useState([]);
      const [savedHints, setSavedHints] = useState([]);
      
      const scrollRef = useRef(null); 
      const [flashcard, setFlashcard] = useState(null);
      const [extraExamples, setExtraExamples] = useState([]);
      const [isFetchingExtra, setIsFetchingExtra] = useState(false);

      const [savedTab, setSavedTab] = useState('qna'); 
      const [isSelectMode, setIsSelectMode] = useState(false);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [usedHintsContext, setUsedHintsContext] = useState([]);

      useEffect(() => {
        const storedData = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (storedData) {
          try {
            const parsed = JSON.parse(storedData);
            setSavedItems(parsed.qna || []);
            setSavedHints(parsed.hints || []);
          } catch (e) {
            console.error("Local storage parsing error");
          }
        }
      }, []);

      const saveToLocal = (qna, hints) => {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify({ qna, hints }));
      };

      useEffect(() => {
        const topics = recommendedTopicsMap[scenario] || [];
        setCurrentRecommendations([...topics].sort(() => 0.5 - Math.random()).slice(0, 5));
      }, [scenario]);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDarkMode);
      }, [isDarkMode]);

      useEffect(() => {
        if (scrollRef.current && qData) scrollRef.current.scrollTo({ top: 0, behavior: 'smooth' });
      }, [qData]);

      const resetSelection = () => { setIsSelectMode(false); setSelectedIds(new Set()); };

      const handleNavView = (newView) => {
        setView(newView);
        setShowAnswer(false);
        resetSelection();
      };

      const startAnswerGeneration = (currentScenario, questionData) => {
        setIsGeneratingAnswers(true);
        generateAnswerData(currentScenario, questionData.topic, questionData.question_en, questionData.hints)
          .then(ansData => {
            setQData(prev => {
              if (prev && prev.question_en === questionData.question_en) {
                return { ...prev, answers: ansData.answers };
              }
              return prev;
            });
          })
          .catch(err => {
            console.error("Answer generation failed:", err);
            setErrorMsg("답변 생성 중 오류가 발생했습니다. 다시 시도해주세요.");
          })
          .finally(() => {
            setIsGeneratingAnswers(false);
          });
      };

      const handleStart = async (useRandom = false) => {
        const topicToUse = useRandom ? null : inputTopic;
        if (!useRandom && !inputTopic.trim()) return;
        
        setLoadingText('질문 생성 중...');
        if (view === 'practice') setIsGeneratingNext(true);
        setErrorMsg(''); setShowAnswer(false); setUsedHintsContext([]);

        try {
          const data = await generateQuestionData(scenario, topicToUse, []);
          setQData({ ...data, answers: [] });
          setUsedHintsContext(data.hints.map(h => h.en));
          if (useRandom) setInputTopic(data.topic);
          handleNavView('practice');
          
          startAnswerGeneration(scenario, data);
        } catch (error) { 
          setErrorMsg(error.message || '오류 발생'); 
        } finally { 
          setLoadingText(''); 
          setIsGeneratingNext(false); 
        }
      };

      const handleContinueTopic = async () => {
        setIsGeneratingNext(true); setErrorMsg(''); setShowAnswer(false);
        try {
          const data = await generateQuestionData(scenario, qData.topic, usedHintsContext);
          setQData({ ...data, answers: [] });
          setUsedHintsContext(prev => [...prev, ...data.hints.map(h => h.en)]);
          
          startAnswerGeneration(scenario, data);
        } catch (error) { 
          setErrorMsg('오류 발생'); 
        } finally { 
          setIsGeneratingNext(false); 
        }
      };

      const handleOpenFlashcard = async (hint) => {
        setFlashcard(hint); setExtraExamples([]);
        if (hint.extra_examples?.length > 0) return setExtraExamples(hint.extra_examples);

        setIsFetchingExtra(true);
        try {
          const newExamples = await fetchExtraExamples(hint.en);
          setExtraExamples(newExamples);
          
          const existingIdx = savedHints.findIndex(h => h.en === hint.en);
          if (existingIdx > -1) {
            const updatedHints = [...savedHints];
            updatedHints[existingIdx].extra_examples = newExamples;
            setSavedHints(updatedHints);
            saveToLocal(savedItems, updatedHints);
          }
        } catch (err) { console.error(err); } 
        finally { setIsFetchingExtra(false); }
      };

      const toggleSaveQnA = () => {
        if (!qData || !qData.answers || qData.answers.length === 0) return;
        const exists = savedItems.find(item => item.question_en === qData.question_en);
        let newItems;
        if (exists) {
          newItems = savedItems.filter(item => item.id !== exists.id);
        } else {
          newItems = [{ id: Date.now().toString(), ...qData, scenario, createdAt: Date.now() }, ...savedItems];
        }
        setSavedItems(newItems);
        saveToLocal(newItems, savedHints);
      };

      const toggleSaveHint = (hint) => {
        const exists = savedHints.find(h => h.en === hint.en);
        let newHints;
        if (exists) {
          newHints = savedHints.filter(h => h.id !== exists.id);
        } else {
          const dataToSave = { id: Date.now().toString(), ...hint, createdAt: Date.now() };
          if (extraExamples.length > 0) dataToSave.extra_examples = extraExamples;
          newHints = [dataToSave, ...savedHints];
        }
        setSavedHints(newHints);
        saveToLocal(savedItems, newHints);
      };

      const toggleSelectionItem = (id) => {
        const newSet = new Set(selectedIds);
        newSet.has(id) ? newSet.delete(id) : newSet.add(id);
        setSelectedIds(newSet);
      };

      const toggleSelectAll = () => {
        const list = savedTab === 'qna' ? savedItems : savedHints;
        selectedIds.size === list.length ? setSelectedIds(new Set()) : setSelectedIds(new Set(list.map(item => item.id)));
      };

      const handleBulkDelete = () => {
        if (selectedIds.size === 0) return;
        if (savedTab === 'qna') {
          const newItems = savedItems.filter(item => !selectedIds.has(item.id));
          setSavedItems(newItems);
          saveToLocal(newItems, savedHints);
        } else {
          const newHints = savedHints.filter(item => !selectedIds.has(item.id));
          setSavedHints(newHints);
          saveToLocal(savedItems, newHints);
        }
        resetSelection();
      };

      const isCurrentSaved = qData && savedItems.some(item => item.question_en === qData.question_en);

      return (
        <div>
          <GradientDefs />
          <div className="font-sans flex flex-col w-full h-screen bg-[#F8FAFC] dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-200">
            
            <div className="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 px-4 py-3 flex justify-between items-center shrink-0 border-b border-slate-100 dark:border-slate-800 z-10 w-full transition-colors duration-200 shadow-sm">
              <div className="flex items-center gap-2">
                {view !== 'setup' && <button onClick={() => handleNavView('setup')} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500"><BackIcon /></button>}
                <AppLogoIcon />
                <div className="flex flex-col">
                  <h1 className="text-[1.15rem] font-extrabold tracking-tight truncate leading-tight mt-0.5 text-[#4F46E5] dark:text-indigo-400">Q&A 마스터</h1>
                  <span className="text-[10px] text-slate-500 font-medium">상황/주제별 영어 대화</span>
                </div>
              </div>
              <div className="flex items-center gap-2.5 ml-auto">
                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-[12px] border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                  {isDarkMode ? <SunIcon /> : <MoonIcon />}
                </button>
                <button onClick={() => handleNavView('saved')} className="flex items-center justify-center gap-1 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 p-2 rounded-[12px] text-[#4F46E5] dark:text-blue-400">
                  <BookmarkIcon filled={false} /> 
                  <span className="bg-[#4F46E5] text-white rounded-full min-w-[20px] h-[20px] flex items-center justify-center text-[11px] px-1 font-semibold">
                    {savedItems.length + savedHints.length}
                  </span>
                </button>
              </div>
            </div>

            <div ref={scrollRef} className="overflow-y-auto flex-grow w-full md:max-w-2xl md:mx-auto px-4 py-4 md:px-3 scroll-smooth">
              {errorMsg && <div className="bg-red-50 dark:bg-red-900/30 text-red-600 p-4 rounded-xl text-sm mb-6 border border-red-200 shadow-sm">{errorMsg}</div>}

              {view === 'setup' && (
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
                  <div className="flex justify-between items-center pt-2 pb-1">
                    <h2 className="text-[21.5px] font-extrabold text-[#111827] dark:text-slate-100 leading-[1.35] tracking-tight">오늘, 어떤 상황에서<br/><span className="text-[#4F46E5] dark:text-indigo-400">영어로 말해볼까요?</span></h2>
                    <div className="w-[100px] h-[85px] shrink-0 mr-[-5px] mt-[-10px]"><RobotIllustration /></div>
                  </div>

                  <div>
                    <div className="flex items-center gap-2.5 mb-3">
                      <span className="bg-[#4F46E5] text-white rounded-full w-5 h-5 flex items-center justify-center text-[12px] font-bold">1</span>
                      <span className="text-[16px] font-bold text-[#374151] dark:text-slate-300">상황을 선택해주세요</span>
                    </div>
                    <div className="flex gap-3 overflow-x-auto hide-scrollbar pb-4 snap-x w-full">
                      {scenarioOptions.map(opt => {
                        const isSelected = scenario === opt.name;
                        return (
                          <button key={opt.name} onClick={() => setScenario(opt.name)} className={`relative flex-none w-[130px] flex flex-col items-center p-4 rounded-[20px] transition-all border-[1.5px] snap-start ${isSelected ? 'bg-[#EEF2FF] border-[#4F46E5] shadow-md dark:bg-indigo-900/30 dark:border-indigo-500' : 'bg-white border-slate-200 hover:border-slate-300 dark:bg-slate-800 dark:border-slate-700'}`}>
                            <div className={`w-12 h-12 rounded-[12px] flex items-center justify-center mb-4 ${opt.iconBg} ${opt.iconColor}`}>{opt.icon}</div>
                            <h3 className={`font-bold text-[14px] leading-[1.3] mb-2 text-center ${isSelected ? 'text-[#4F46E5] dark:text-indigo-300' : 'text-[#111827] dark:text-slate-200'}`}>
                              {opt.name.split(' ').map((word, i) => <React.Fragment key={i}>{word}<br/></React.Fragment>)}
                            </h3>
                            <p className="text-[11px] text-[#6B7280] text-center leading-[1.4] break-keep">{opt.desc}</p>
                            {isSelected && <div className="absolute top-2.5 right-2.5 text-[#4F46E5] bg-[#EEF2FF] rounded-full"><CheckmarkFilled className="w-5 h-5" /></div>}
                          </button>
                        )
                      })}
                    </div>
                  </div>

                  <div className="pt-2">
                    <div className="flex items-center justify-between mb-4">
                      <div className="flex items-center gap-2.5">
                        <span className="bg-[#4F46E5] text-white rounded-full w-5 h-5 flex items-center justify-center text-[12px] font-bold">2</span>
                        <span className="text-[16px] font-bold text-[#374151] dark:text-slate-300">어떤 주제로 연습할까요?</span>
                      </div>
                      <button onClick={() => handleStart(true)} className="flex items-center gap-1.5 bg-[#F0F5FF] dark:bg-indigo-900/30 text-[#4F46E5] dark:text-indigo-400 text-[12px] font-bold px-3 py-1.5 rounded-lg border border-[#E0E7FF]"><ShuffleIcon width={14} height={14} /> 랜덤 주제</button>
                    </div>

                    <div className="relative mb-3">
                      {!inputTopic && <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><PencilIcon className="w-[18px] h-[18px]" /></div>}
                      <input type="text" value={inputTopic} onChange={(e) => setInputTopic(e.target.value)} placeholder="직접 입력 또는 랜덤 주제를 탭하세요" className={`w-full py-4 pr-4 ${inputTopic ? 'pl-4' : 'pl-11'} placeholder:text-[14px] bg-white dark:bg-slate-800 border-[1.5px] border-slate-200 dark:border-slate-700 text-[#111827] dark:text-slate-100 rounded-[16px] focus:ring-2 focus:ring-[#4F46E5] outline-none font-medium`} onKeyDown={(e) => e.key === 'Enter' && handleStart(false)} />
                    </div>

                    <div className="flex flex-nowrap items-center gap-2 mb-6 px-0.5 overflow-x-auto hide-scrollbar pb-1">
                      <span className="text-[12px] font-bold text-[#6B7280] bg-slate-100 dark:bg-slate-800 px-3.5 py-2 rounded-full shrink-0 border border-slate-200 dark:border-slate-700">추천 주제</span>
                      {currentRecommendations.map(topic => (
                        <button key={topic} onClick={() => setInputTopic(topic)} className="text-[12px] text-[#374151] dark:text-slate-300 bg-white dark:bg-slate-800 px-3.5 py-2 rounded-full border border-slate-200 dark:border-slate-700 hover:bg-slate-50 shrink-0 font-medium">{topic}</button>
                      ))}
                    </div>
                    
                    <button onClick={() => handleStart(false)} disabled={!!loadingText || !inputTopic.trim()} className="w-full flex items-center justify-center gap-3 bg-[#4F46E5] hover:bg-[#4338CA] text-white py-[14px] px-6 rounded-[16px] shadow-md disabled:opacity-50">
                      {loadingText ? (
                        <div className="flex items-center gap-2"><LoaderIcon className="animate-spin w-5 h-5 text-white" /><span className="font-bold text-[16px] flex items-center gap-1.5">AI가 대화를 생성중입니다 <SmileIcon className="w-5 h-5 -mt-0.5" /></span></div>
                      ) : (
                        <><SparkleIcon className="w-[22px] h-[22px]" /><div className="flex flex-col items-center"><span className="font-bold text-[16px] leading-snug">{inputTopic.trim() ? '터치하여 AI 대화 생성' : '주제를 입력/선택하세요'}</span></div></>
                      )}
                    </button>
                  </div>
                </div>
              )}

              {view === 'practice' && qData && (
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
                  <div className="flex flex-col gap-1.5 ml-1 mt-1 mb-2">
                    <span className="text-[13px] text-slate-500 font-medium">상황: {scenario}</span>
                    <div className="bg-[#EEF2FF] dark:bg-indigo-900/20 py-2 px-4 rounded-[12px] border border-[#E0E7FF] w-fit">
                      <span className="text-[#4F46E5] dark:text-indigo-300 font-bold text-[14.5px]">주제: {qData.topic}</span>
                    </div>
                  </div>

                  <div className="bg-white dark:bg-slate-800 p-5 rounded-[20px] shadow-sm border-[1.5px] border-slate-200 dark:border-slate-700">
                    <span className="text-[14px] font-bold text-[#4F46E5] dark:text-indigo-400 mb-2.5 flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 상대방의 질문</span>
                    <p className="text-[17px] font-bold leading-[1.5] text-[#111827] dark:text-slate-100 mb-3">{qData.question_en.replace(/\[\[|\]\]/g, '')}</p>
                    <hr className="border-slate-100 dark:border-slate-700 mb-3" />
                    <p className="text-[14px] leading-[1.6] text-[#6B7280] dark:text-slate-400">{qData.question_ko.replace(/\[\[|\]\]/g, '')}</p>
                  </div>

                  <div className="flex flex-col gap-3 bg-[#EEF2FF] dark:bg-indigo-900/20 border-[1.5px] border-[#E0E7FF] dark:border-indigo-800/50 p-5 rounded-[20px]">
                    <div className="flex items-center gap-1.5 text-[#4F46E5] dark:text-indigo-300"><LightbulbIcon /><span className="text-[14px] font-bold">답변 힌트 <span className="font-normal opacity-80 text-[12px] ml-1">(클릭하여 예문 보기)</span></span></div>
                    <div className="flex flex-wrap gap-2 mt-1">
                      {qData.hints.map((hint, idx) => (
                        <button key={idx} onClick={() => handleOpenFlashcard(hint)} className="bg-white dark:bg-slate-800 hover:bg-indigo-50 text-[#4F46E5] dark:text-indigo-300 text-[14.5px] font-bold px-4 py-2.5 rounded-[12px] border border-[#BFDBFE] dark:border-slate-600 shadow-sm flex flex-col items-start gap-0.5 text-left">
                          <span>{hint.en}</span><span className="text-[12px] text-indigo-400 font-medium">{hint.ko.replace(/\[\[|\]\]/g, '')}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {!showAnswer ? (
                    <button onClick={() => setShowAnswer(true)} className="w-full bg-[#111827] hover:bg-[#1F2937] dark:bg-slate-700 text-white font-bold py-4 rounded-[16px] shadow-sm mt-2 text-[15px]">수준별 모범 답안 확인하기</button>
                  ) : (
                    <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 pt-2">
                      <h3 className="font-bold text-[18px] text-[#111827] dark:text-slate-200 mb-4 ml-1">모범 답안</h3>
                      {isGeneratingAnswers || !qData.answers || qData.answers.length === 0 ? (
                        <div className="flex flex-col items-center justify-center py-8 gap-3 bg-white dark:bg-slate-800 border-[1.5px] border-slate-200 dark:border-slate-700 rounded-[20px]">
                          <LoaderIcon className="animate-spin w-8 h-8 text-[#4F46E5]" />
                          <span className="text-[14px] font-medium text-slate-500">답변을 생성하고 있습니다...</span>
                        </div>
                      ) : (
                        <div className="space-y-4">
                          {qData.answers.map((ans, idx) => {
                            const style = LEVEL_STYLES[ans.level] || LEVEL_STYLES['초중급'];
                            return (
                              <div key={idx} className={`p-[20px] rounded-[20px] border-[1.5px] ${style.bg} ${style.border}`}>
                                <div className="flex justify-between items-center mb-3.5">
                                  <span className={`flex items-center gap-1.5 text-[12.5px] font-bold px-2.5 py-1.5 rounded-[8px] ${style.tagBg} ${style.tagText} w-fit`}><LevelIcon level={ans.level} /> {ans.level}</span>
                                  <button onClick={() => playTTSBrowser(ans.en)} className="flex items-center gap-1.5 bg-white border border-slate-200 dark:bg-slate-700 px-3 py-1.5 rounded-full text-[12px] font-bold"><PlayIcon width={13} height={13} /> 음성 재생</button>
                                </div>
                                <p className="text-[15px] leading-[1.65] text-[#111827] dark:text-slate-100 font-normal mb-3">{renderHighlightedText(ans.en, ans.level)}</p>
                                <hr className="border-slate-200 dark:border-slate-700 mb-3" />
                                <p className="text-[13.5px] leading-[1.6] text-[#6B7280]">{ans.ko.replace(/\[\[|\]\]/g, '')}</p>
                              </div>
                            );
                          })}
                        </div>
                      )}

                      <div className="grid grid-cols-2 gap-3 pt-4">
                        <button onClick={handleContinueTopic} disabled={isGeneratingNext} className="col-span-2 bg-[#4F46E5] hover:bg-[#4338CA] text-white font-bold py-[14px] rounded-[16px] shadow-sm text-[15px] flex justify-center items-center gap-2"><RefreshIcon /> 계속 대화하기</button>
                        <button onClick={toggleSaveQnA} disabled={isGeneratingAnswers} className={`flex justify-center items-center gap-2 font-bold py-[14px] rounded-[16px] text-[14px] border-[1.5px] ${isCurrentSaved ? 'bg-[#EEF2FF] text-[#4F46E5] border-[#BFDBFE]' : 'bg-white dark:bg-slate-800 border-slate-200 text-[#374151] dark:text-slate-300'} disabled:opacity-50`}><BookmarkIcon filled={isCurrentSaved} /> {isCurrentSaved ? '저장됨' : '저장하기'}</button>
                        <button onClick={() => handleStart(true)} disabled={!!loadingText || isGeneratingNext} className="bg-white dark:bg-slate-800 border-[1.5px] border-slate-200 text-[#374151] dark:text-slate-300 font-bold py-[14px] rounded-[16px] flex justify-center items-center gap-2 text-[14px]"><ShuffleIcon /> 랜덤 질문</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {view === 'saved' && (
                <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-10">
                  <h2 className="text-xl font-bold text-[#111827] dark:text-slate-200 px-1">저장함</h2>
                  
                  <div className="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-[14px]">
                    <button onClick={() => { setSavedTab('qna'); resetSelection(); }} className={`flex-1 py-2 text-[14px] font-bold rounded-[10px] transition-all ${savedTab === 'qna' ? 'bg-white dark:bg-slate-700 text-[#4F46E5] shadow-sm' : 'text-slate-500'}`}>Q&A ({savedItems.length})</button>
                    <button onClick={() => { setSavedTab('hints'); resetSelection(); }} className={`flex-1 py-2 text-[14px] font-bold rounded-[10px] transition-all ${savedTab === 'hints' ? 'bg-white dark:bg-slate-700 text-[#4F46E5] shadow-sm' : 'text-slate-500'}`}>단어장 ({savedHints.length})</button>
                  </div>

                  <div className="flex justify-between items-center px-1 h-8">
                    {isSelectMode ? (
                      <><button onClick={toggleSelectAll} className="text-[14px] font-bold text-[#4F46E5]">{selectedIds.size === (savedTab === 'qna' ? savedItems.length : savedHints.length) ? '선택 해제' : '전체 선택'}</button><div className="flex gap-4"><button onClick={resetSelection} className="text-[14px] font-bold text-slate-500">취소</button><button onClick={handleBulkDelete} disabled={selectedIds.size === 0} className="text-[14px] font-bold text-red-600 disabled:opacity-50">삭제 ({selectedIds.size})</button></div></>
                    ) : (
                      <div className="w-full flex justify-end">
                        {((savedTab === 'qna' && savedItems.length > 0) || (savedTab === 'hints' && savedHints.length > 0)) && <button onClick={() => setIsSelectMode(true)} className="text-[14px] font-bold text-slate-500 hover:text-[#111827]">편집</button>}
                      </div>
                    )}
                  </div>

                  {savedTab === 'qna' ? (
                    savedItems.length === 0 ? <div className="text-center py-12 text-slate-500 text-[14px] font-medium bg-slate-50 dark:bg-slate-800/50 rounded-[16px] border border-slate-100">저장된 데이터가 없습니다.</div> : (
                      <div className="space-y-4">
                        {savedItems.map((item) => (
                          <div key={item.id} className="flex gap-3 items-start animate-in fade-in zoom-in-95">
                            {isSelectMode && <button onClick={() => toggleSelectionItem(item.id)} className="mt-6 shrink-0"><CheckCircleIcon selected={selectedIds.has(item.id)} /></button>}
                            <div onClick={() => isSelectMode && toggleSelectionItem(item.id)} className={`flex-1 bg-white dark:bg-slate-800 border-[1.5px] p-5 md:px-6 rounded-[20px] shadow-sm ${isSelectMode ? 'cursor-pointer hover:border-indigo-400' : 'border-slate-200'} ${selectedIds.has(item.id) ? 'ring-2 ring-[#4F46E5]' : ''}`}>
                              <span className="text-[12px] font-bold px-3 py-1.5 bg-slate-100 dark:bg-slate-700 rounded-[8px] text-[#6B7280] mb-4 inline-block">{item.scenario}</span>
                              <div className="mb-5 bg-[#F9FAFB] dark:bg-slate-900/50 p-4 rounded-[16px] border border-slate-100 dark:border-slate-800">
                                <p className="text-[13px] font-extrabold text-[#4F46E5] mb-1.5">Q</p>
                                <p className="text-[16px] leading-[1.6] font-bold text-[#111827] dark:text-slate-100">{item.question_en.replace(/\[\[|\]\]/g, '')}</p>
                                <p className="text-[14px] text-[#6B7280] mt-2">{item.question_ko.replace(/\[\[|\]\]/g, '')}</p>
                              </div>
                              <div className="space-y-4">
                                {item.answers.map((ans, i) => {
                                  const style = LEVEL_STYLES[ans.level] || LEVEL_STYLES['초중급'];
                                  return (
                                    <div key={i} className={`p-[16px] border-[1.5px] rounded-[16px] ${style.bg} ${style.border}`}>
                                      <span className={`flex items-center gap-1.5 text-[12px] font-bold px-2.5 py-1 rounded-[8px] ${style.tagBg} ${style.tagText} mb-2.5 w-fit`}><LevelIcon level={ans.level} />{ans.level}</span>
                                      <span className="text-[#111827] dark:text-slate-200 font-normal block leading-[1.65] text-[15px] mb-2">{renderHighlightedText(ans.en, ans.level)}</span>
                                      <hr className="border-slate-200/60 my-2" />
                                      <span className="text-[#6B7280] text-[13.5px] block">{ans.ko.replace(/\[\[|\]\]/g, '')}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )
                  ) : (
                    savedHints.length === 0 ? <div className="text-center py-12 text-slate-500 text-[14px] bg-slate-50 rounded-[16px] border border-slate-100">저장된 단어가 없습니다.</div> : (
                      <div className="grid grid-cols-1 gap-4">
                        {savedHints.map((hint) => (
                          <div key={hint.id} className="flex gap-3 items-center animate-in fade-in zoom-in-95">
                            {isSelectMode && <button onClick={() => toggleSelectionItem(hint.id)} className="shrink-0"><CheckCircleIcon selected={selectedIds.has(hint.id)} /></button>}
                            <div onClick={() => isSelectMode ? toggleSelectionItem(hint.id) : handleOpenFlashcard(hint)} className={`flex-1 bg-white dark:bg-slate-800 border-[1.5px] p-[20px] rounded-[20px] shadow-sm cursor-pointer hover:border-indigo-300 ${selectedIds.has(hint.id) ? 'ring-2 ring-[#4F46E5]' : 'border-slate-200 dark:border-slate-700'}`}>
                              <p className="font-extrabold text-[#111827] dark:text-slate-100 text-[20px] mb-1.5">{hint.en}</p>
                              <p className="text-[14.5px] text-[#4F46E5] font-bold mb-4">{hint.ko.replace(/\[\[|\]\]/g, '')}</p>
                              <div className="bg-[#F9FAFB] dark:bg-slate-900/50 p-[16px] rounded-[14px] border border-slate-100 text-[#374151] dark:text-slate-300">
                                <p className="text-[15px] leading-[1.6] mb-1.5">{renderHighlightedText(hint.example_en, '기본')}</p>
                                <p className="text-[13.5px] text-[#6B7280]">{hint.example_ko.replace(/\[\[|\]\]/g, '')}</p>
                              </div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )
                  )}
                </div>
              )}
            </div>

            {isGeneratingNext && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex justify-center items-center p-6 animate-in fade-in">
                <div className="bg-white dark:bg-slate-800 px-8 py-10 rounded-[24px] shadow-2xl flex flex-col items-center gap-4 text-center max-w-xs animate-in zoom-in-95 border border-slate-200 dark:border-slate-700"><LoaderIcon className="animate-spin w-8 h-8 text-[#4F46E5]" /><div className="space-y-1.5 flex flex-col items-center"><div className="flex items-center gap-1.5"><p className="text-[18px] font-extrabold text-[#111827] dark:text-slate-100">AI가 대화를 생성중입니다</p><SmileIcon className="w-6 h-6 -mt-0.5 text-[#111827] dark:text-slate-100" /></div><p className="text-[14px] text-[#6B7280] font-medium">잠시만 기다려주세요...</p></div></div>
              </div>
            )}

            {flashcard && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex justify-center items-center p-4">
                <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[24px] shadow-2xl overflow-hidden animate-in zoom-in-95 border border-slate-200 flex flex-col max-h-[85vh]">
                  <div className="bg-[#4F46E5] dark:bg-slate-900 p-4 flex justify-between items-center text-white shrink-0"><span className="font-bold text-[15px] flex items-center gap-2"><LightbulbIcon /> 표현 학습</span><button onClick={() => setFlashcard(null)} className="p-1 bg-white/20 rounded-full"><CloseIcon /></button></div>
                  <div className="py-8 px-5 overflow-y-auto grow">
                    <div className="text-center mb-8"><h3 className="text-[28px] font-extrabold text-[#111827] dark:text-slate-100 mb-2.5">{flashcard.en}</h3><p className="text-[16px] text-[#4F46E5] font-bold">{flashcard.ko.replace(/\[\[|\]\]/g, '')}</p></div>
                    <div className="space-y-4 mb-8">
                      <div className="bg-[#F9FAFB] dark:bg-slate-900 p-[20px] rounded-[16px] border border-slate-100 dark:border-slate-700">
                        <span className="text-[12px] font-bold text-[#9CA3AF] block mb-3">Example 1</span>
                        <p className="text-[16px] text-[#111827] dark:text-slate-200 mb-3">"{renderHighlightedText(flashcard.example_en, '기본')}"</p>
                        <p className="text-[14px] text-[#6B7280]">{flashcard.example_ko.replace(/\[\[|\]\]/g, '')}</p>
                      </div>
                      {isFetchingExtra ? <div className="flex justify-center items-center py-8 border border-slate-100 rounded-[16px] bg-[#F9FAFB]"><LoaderIcon className="animate-spin w-6 h-6 text-[#4F46E5]" /></div> : extraExamples.map((ex, i) => (
                        <div key={i} className="bg-[#EEF2FF] dark:bg-indigo-900/10 p-[20px] rounded-[16px] border border-[#E0E7FF] dark:border-indigo-800/30">
                          <span className="text-[12px] font-bold text-[#4F46E5] block mb-3">Example {i + 2}</span>
                          <p className="text-[16px] text-[#111827] dark:text-slate-200 mb-3">"{renderHighlightedText(ex.en, '기본')}"</p>
                          <p className="text-[14px] text-[#6B7280]">{ex.ko.replace(/\[\[|\]\]/g, '')}</p>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => { toggleSaveHint(flashcard); setFlashcard(null); }} className={`w-full py-4 rounded-[14px] font-bold flex justify-center items-center gap-2 text-[16px] shadow-sm ${savedHints.some(h => h.en === flashcard.en) ? 'bg-slate-200 dark:bg-slate-700 text-[#374151]' : 'bg-[#4F46E5] text-white'}`}><BookmarkIcon filled={savedHints.some(h => h.en === flashcard.en)} /> {savedHints.some(h => h.en === flashcard.en) ? '단어장에서 제거' : '단어장에 저장'}</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
